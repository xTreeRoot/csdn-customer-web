server {
    listen 80;
    server_name 121.43.245.6;

    # 带斜杠的路径
    location /admin/ {
        alias /var/www/csdn-admin-web/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # 管理后台静态资源
    location /admin/assets/ {
        alias /var/www/csdn-admin-web/assets/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /customer/ {
        alias /var/www/csdn-customer-web/;
        index index.html;
        try_files $uri $uri/ /customer/index.html;
    }

    # 客户端静态资源
    location /customer/assets/ {
        alias /var/www/csdn-customer-web/assets/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 将不带斜杠的路径重定向到带斜杠的路径
    location = /admin {
        return 301 /admin/;
    }

    location = /customer {
        return 301 /customer/;
    }

    location /api {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location /bot {
        proxy_pass http://127.0.0.1:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    client_max_body_size 100M;
    gzip on;
}
